        );
        const Settings = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        );

        // --- Демонстрационная база слов при первом старте ---
        const INITIAL_DEMO_NOUNS = [
            "абажур", "абрикос", "автобус", "автомобиль", "агент", "адвокат", "адрес", "айсберг", "академия", "аквариум",
            "актер", "алмаз", "алфавит", "альбом", "анализ", "ананас", "ангел", "анекдот", "антенна", "апельсин", 
            "аппарат", "аптека", "арбуз", "арена", "армия", "архив", "астроном", "асфальт", "атлас", "атмосфера"
        ].sort((a, b) => a.localeCompare(b, 'ru'));

        // Вспомогательные функции для корректной работы с UTF-8 в Base64 (для GitHub API)
        const decodeBase64UTF8 = (base64) => {
            const binaryString = atob(base64.replace(/\s/g, ''));
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        };

        const encodeBase64UTF8 = (str) => {
            const bytes = new TextEncoder().encode(str);
            let binaryString = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binaryString += String.fromCharCode(bytes[i]);
            }
            return btoa(binaryString);
        };

        // --- ГЛАВНЫЙ КОМПОНЕНТ ПРИЛОЖЕНИЯ ---
        function App() {
            // Определение протокола запуска файла
            const isLocalFile = typeof window !== 'undefined' && window.location.protocol === 'file:';

            // --- Состояния приложения ---
            const [dictionary, setDictionary] = useState(() => {
                try {
                    const saved = localStorage.getItem('nounforge_dictionary');
                    return saved ? JSON.parse(saved) : INITIAL_DEMO_NOUNS;
                } catch {
                    return INITIAL_DEMO_NOUNS;
                }
            });

            const [inputText, setInputText] = useState('');
            const [processingMode, setProcessingMode] = useState('ai'); 
            const [isLoading, setIsLoading] = useState(false);
            const [candidates, setCandidates] = useState([]); 
            
            const [searchQuery, setSearchQuery] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 30;

            const [candidateSearchQuery, setCandidateSearchQuery] = useState('');
            const [manualWord, setManualWord] = useState('');
            const [toast, setToast] = useState(null);

            const [editingIndex, setEditingIndex] = useState(null);
            const [editingValue, setEditingValue] = useState('');

            // --- Состояния GitHub Интеграции ---
            const [ghToken, setGhToken] = useState(() => localStorage.getItem('nf_gh_token') || '');
            const [ghOwner, setGhOwner] = useState(() => localStorage.getItem('nf_gh_owner') || '');
            const [ghRepo, setGhRepo] = useState(() => localStorage.getItem('nf_gh_repo') || '');
            const [ghBranch, setGhBranch] = useState(() => localStorage.getItem('nf_gh_branch') || 'main');
            const [ghPath, setGhPath] = useState(() => localStorage.getItem('nf_gh_path') || 'russian_words_nouns.txt');
            const [ghSha, setGhSha] = useState(() => localStorage.getItem('nf_gh_sha') || '');
            const [ghStatus, setGhStatus] = useState('disconnected'); // 'disconnected', 'loading', 'connected', 'error', 'syncing'
            const [autoCommit, setAutoCommit] = useState(() => localStorage.getItem('nf_gh_autocommit') === 'true');
            const [showGhConfig, setShowGhConfig] = useState(false);
            const [isCommitPending, setIsCommitPending] = useState(false);

            // ПРЕДОХРАНИТЕЛИ: Важные состояния для защиты от затирания файлов
            const [isSyncedWithGitHub, setIsSyncedWithGitHub] = useState(false);
            const [githubWordsCount, setGithubWordsCount] = useState(null);
            const [showOverWriteModal, setShowOverOverWriteModal] = useState(false);

            // Сохранение словаря в localStorage при изменении
            useEffect(() => {
                localStorage.setItem('nounforge_dictionary', JSON.stringify(dictionary));
            }, [dictionary]);

            // Сохранение настроек GitHub при изменении
            useEffect(() => {
                localStorage.setItem('nf_gh_token', ghToken);
                localStorage.setItem('nf_gh_owner', ghOwner);
                localStorage.setItem('nf_gh_repo', ghRepo);
                localStorage.setItem('nf_gh_branch', ghBranch);
                localStorage.setItem('nf_gh_path', ghPath);
                localStorage.setItem('nf_gh_sha', ghSha);
                localStorage.setItem('nf_gh_autocommit', autoCommit.toString());
            }, [ghToken, ghOwner, ghRepo, ghBranch, ghPath, ghSha, autoCommit]);

            // Автоматический pull из GitHub при старте приложения, если есть настройки и запуск не из локального файла
            useEffect(() => {
                if (ghToken.trim() && ghOwner.trim() && ghRepo.trim() && !isLocalFile) {
                    handlePullFromGitHub(true);
                }
            }, []);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 8000); 
            };

            // --- ФУНКЦИИ GITHUB REST API ---

            // Загрузка словаря из GitHub (Исправленный, CORS-совместимый двухэтапный метод)
            const handlePullFromGitHub = async (quiet = false) => {
                const token = ghToken.trim().replace(/^(token|bearer)\s+/i, '');
                const owner = ghOwner.trim();
                const repo = ghRepo.trim();
                const branch = ghBranch.trim();
                const path = ghPath.trim().replace(/^\/+/, ''); // Исключаем ведущие слэши

                if (!token || !owner || !repo) {
                    if (!quiet) showToast("Заполните настройки интеграции с GitHub (Токен, Владелец, Репозиторий)", "error");
                    return;
                }

                if (isLocalFile) {
                    showToast("Не удалось выполнить запрос: браузер блокирует CORS-запросы с локальных файлов.", "error");
                    return;
                }

                setGhStatus('loading');
                
                // Шаг 1: Читаем метаданные файла через стандартный REST API (полная поддержка CORS и авторизации)
                const metaUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}&_t=${Date.now()}`;

                try {
                    const metaResponse = await fetch(metaUrl, {
                        method: 'GET',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (metaResponse.status === 404) {
                        setGhStatus('connected');
                        setGhSha('');
                        setGithubWordsCount(0);
                        setIsSyncedWithGitHub(true); 
                        if (!quiet) showToast("Файл еще не создан в вашем репозитории на GitHub. Синхронизация установлена.", "info");
                        return;
                    }

                    if (!metaResponse.ok) {
                        if (metaResponse.status === 401) throw new Error("Неверный токен доступа (401 Unauthorized). Проверьте токен.");
                        if (metaResponse.status === 404) throw new Error("Репозиторий или файл не найдены (404).");
                        throw new Error(`Ошибка метаданных API: ${metaResponse.status}`);
                    }

                    const metaData = await metaResponse.json();
                    setGhSha(metaData.sha);

                    let decodedContent = "";

                    // Шаг 2: Умное скачивание контента
                    if (metaData.size < 1000000 && metaData.content) {
                        // Если файл маленький (<1MB), скачиваем его напрямую из метаданных (он уже там в Base64)
                        decodedContent = decodeBase64UTF8(metaData.content);
                    } else {
                        // Если файл большой (>1MB, например, ваш словарь на 101k слов), скачиваем его blob-объект по его SHA.
                        // Этот эндпоинт находится на api.github.com, безупречно поддерживает CORS, авторизацию и файлы до 100MB!
                        const blobUrl = `https://api.github.com/repos/${owner}/${repo}/git/blobs/${metaData.sha}`;
                        const blobResponse = await fetch(blobUrl, {
                            method: 'GET',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });

                        if (!blobResponse.ok) {
                            throw new Error(`Ошибка загрузки контента большого файла: ${blobResponse.status}`);
                        }

                        const blobData = await blobResponse.json();
                        decodedContent = decodeBase64UTF8(blobData.content);
                    }
                    
                    const words = decodedContent
                        .split(/[\r\n]+/)
                        .map(w => w.trim().toLowerCase())
                        .filter(w => w && /^[а-яё\-]+$/.test(w));

                    setGithubWordsCount(words.length);
                    setIsSyncedWithGitHub(true); 
                    setGhStatus('connected');

                    setDictionary(prev => {
                        // Замещаем дефолтные 30 слов на реальный словарь из репозитория
                        const isDemoOnly = prev.every(w => INITIAL_DEMO_NOUNS.includes(w)) && prev.length <= INITIAL_DEMO_NOUNS.length;
                        const baseList = isDemoOnly ? [] : prev;
                        const merged = [...new Set([...baseList, ...words])].sort((a, b) => a.localeCompare(b, 'ru'));
                        return merged;
                    });

                    if (!quiet) showToast(`Успешно загружено и синхронизировано слов с GitHub: ${words.length}`, "success");
                } catch (error) {
                    console.error("GitHub Pull Error:", error);
                    setGhStatus('error');
                    setIsSyncedWithGitHub(false); 
                    if (!quiet) {
                        let userFriendlyMessage = error.message;
                        if (userFriendlyMessage.includes("Failed to fetch")) {
                            userFriendlyMessage = "Ошибка CORS/Сети (Failed to fetch). Возможные причины: 1) Включен блокировщик рекламы AdBlock/Brave Shields; 2) Работает VPN; 3) Опечатка в полях Owner или Repo.";
                        }
                        showToast(userFriendlyMessage, "error");
                    }
                }
            };

            // Коммит и пуш словаря в GitHub (с защитой от затирания)
            const handlePushToGitHub = async (forcedDictionary = null, isForcedOverride = false) => {
                const dictToSave = forcedDictionary || dictionary;
                const token = ghToken.trim().replace(/^(token|bearer)\s+/i, '');
                const owner = ghOwner.trim();
                const repo = ghRepo.trim();
                const branch = ghBranch.trim();
                const path = ghPath.trim().replace(/^\/+/, '');

                if (!token || !owner || !repo) {
                    showToast("Заполните настройки интеграции с GitHub для отправки коммита", "error");
                    return;
                }

                if (isLocalFile) {
                    showToast("Запись заблокирована: file:// протокол не поддерживает сетевые запросы API.", "error");
                    return;
                }

                // ПРЕДОХРАНИТЕЛЬ 1: Защита от случайного Push, если еще ни разу не делали Pull
                if (!isSyncedWithGitHub && !isForcedOverride && ghSha) {
                    setShowOverOverWriteModal(true);
                    return;
                }

                // ПРЕДОХРАНИТЕЛЬ 2: Защита от затирания большого объема маленьким объемом локальных данных
                if (githubWordsCount !== null && githubWordsCount > dictToSave.length + 50 && !isForcedOverride) {
                    setShowOverOverWriteModal(true);
                    return;
                }

                setIsCommitPending(true);
                setGhStatus('syncing');

                const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const sortedDict = [...dictToSave].sort((a, b) => a.localeCompare(b, 'ru'));
                const fileContent = sortedDict.join('\n'); 
                const base64Content = encodeBase64UTF8(fileContent);

                try {
                    let currentSha = ghSha;
                    
                    // Запрашиваем свежий SHA
                    const getResponse = await fetch(`${url}?ref=${branch}&_t=${Date.now()}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (getResponse.ok) {
                        const getData = await getResponse.json();
                        currentSha = getData.sha;
                        setGhSha(currentSha);
                    }

                    const bodyPayload = {
                        message: "NounForge: update dictionary [skip ci]",
                        content: base64Content,
                        branch: branch
                    };

                    if (currentSha) {
                        bodyPayload.sha = currentSha;
                    }

                    const putResponse = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify(bodyPayload)
                    });

                    if (!putResponse.ok) {
                        const errorData = await putResponse.json();
                        throw new Error(errorData.message || `Код ошибки сервера: ${putResponse.status}`);
                    }

                    const putData = await putResponse.json();
                    setGhSha(putData.content.sha);
                    setGithubWordsCount(sortedDict.length);
                    setIsSyncedWithGitHub(true); 
                    setGhStatus('connected');
                    showToast("Изменения успешно сохранены и закомичены в ваш репозиторий GitHub!", "success");
                } catch (error) {
                    console.error("GitHub Push Error:", error);
                    setGhStatus('error');
                    let userFriendlyMessage = error.message;
                    if (userFriendlyMessage.includes("Failed to fetch")) {
                        userFriendlyMessage = "Ошибка отправки коммита. Отключите VPN/AdBlock, блокирующие PUT запросы к GitHub.";
                    }
                    showToast(userFriendlyMessage, "error");
                } finally {
                    setIsCommitPending(false);
                }
            };

            const triggerAutoCommitIfEnabled = (updatedDict) => {
                if (autoCommit && ghToken.trim() && ghOwner.trim() && ghRepo.trim()) {
                    if (!isSyncedWithGitHub) {
                        console.warn("Авто-коммит приостановлен: локальная база не синхронизирована с сервером.");
                        showToast("Авто-коммит заблокирован: сначала выполните Pull, чтобы не стереть удаленные данные!", "warning");
                        return;
                    }
                    handlePushToGitHub(updatedDict);
                }
            };

            // --- ЭКСПОНЕНЦИАЛЬНЫЙ БЭК-ОФФ ДЛЯ GEMINI ---
            const extractNounsWithGemini = async (text, retries = 5, delay = 1000) => {
                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const systemPrompt = `Ты — профессиональный лингвистический экстрактор и лемматизатор русского языка. Твоя задача — проанализировать предоставленный русский текст и извлечь из него ВСЕ имена существительные. 
Для каждого найденного существительного строго соблюдай следующие требования:
1. Приведи его к начальной форме: единственное число, именительный падеж (номинатив). Например: "столами" -> "стол", "людьми" -> "человек", "книгу" -> "книга".
2. Существительные, употребляемые только во множественном числе (например: "ножницы", "брюки", "сутки", "шахматы"), оставь в их единственной нормальной форме (как в словарях).
3. Строго ИСКЛЮЧИ:
   - Имена собственные (имена людей, фамилии, отчества, клички животных, географические названия, бренды, компании, торговые марки).
   - Аббревиатуры (например: СССР, МЧС, ИИ, США, вуз, ЖКХ) и иностранные слова не на кириллице.
   - Все остальные части речи: глаголы, прилагательные, местоимения, предлоги, союзы, междометия, причастия, деепричастия, числительные.
4. Оставь только нарицательные неодушевленные и одушевленные существительные в единственном числе именительном падеже.
5. Верни результат СТРОГО в формате JSON с корневым ключом "nouns", содержащим плоский массив строк в нижнем регистре. Не используй markdown-разметку \`\`\`json вокруг JSON-ответа, верни чистую строку JSON.
Пример ответа: { "nouns": ["автомоль", "книга", "яблоко"] }`;

                const payload = {
                    contents: [{ parts: [{ text }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                nouns: {
                                    type: "ARRAY",
                                    items: { type: "STRING" }
                                }
                            },
                            required: ["nouns"]
                        }
                    }
                };

                for (let attempt = 1; attempt <= retries; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) {
                            throw new Error(`Код ответа API: ${response.status}`);
                        }
                        
                        const result = await response.json();
                        const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (responseText) {
                            const parsed = JSON.parse(responseText);
                            if (parsed && Array.isArray(parsed.nouns)) {
                                return parsed.nouns
                                    .map(word => word.trim().toLowerCase())
                                    .filter(word => /^[а-яё\-]+$/.test(word));
                            }
                        }
                        throw new Error("Не удалось разобрать структуру ответа Gemini");
                    } catch (error) {
                        if (attempt === retries) {
                            throw error;
                        }
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    }
                }
            };

            // --- Обработка текста ---
            const handleProcessText = async () => {
                if (!inputText.trim()) {
                    showToast("Введите или вставьте текст для обработки", "error");
                    return;
                }

                setIsLoading(true);
                try {
                    let extractedWords = [];

                    if (processingMode === 'ai') {
                        extractedWords = await extractNounsWithGemini(inputText);
                    } else {
                        const rawWords = inputText.match(/[а-яА-ЯёЁ\-]+/g) || [];
                        extractedWords = [...new Set(rawWords.map(w => w.toLowerCase()))];
                    }

                    if (extractedWords.length === 0) {
                        showToast("Не удалось найти подходящих существительных в тексте", "warning");
                        setCandidates([]);
                        setIsLoading(false);
                        return;
                    }

                    const newCandidates = extractedWords.map((word, index) => {
                        const alreadyExists = dictionary.includes(word);
                        const isValidFormat = /^[а-яё\-]+$/.test(word) && word.length > 1;
                        
                        let status = 'new';
                        if (alreadyExists) status = 'duplicate';
                        else if (!isValidFormat) status = 'invalid';

                        return {
                            id: `cand-${index}-${Date.now()}`,
                            word,
                            status,
                            selected: status === 'new'
                        };
                    });

                    setCandidates(newCandidates);
                    
                    const newCount = newCandidates.filter(c => c.status === 'new').length;
                    showToast(`Анализ завершен! Найдено существительных: ${extractedWords.length} (Новых: ${newCount})`, "success");
                } catch (error) {
                    console.error(error);
                    showToast(`Ошибка разбора: ${error.message || "Попробуйте еще раз или используйте локальный режим"}`, "error");
                } finally {
                    setIsLoading(false);
                }
            };

            // Загрузка локального файла
            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    
                    const words = text
                        .split(/[\r\n]+/)
                        .map(w => w.trim().toLowerCase())
                        .filter(w => w && /^[а-яё\-]+$/.test(w));

                    if (words.length === 0) {
                        showToast("В загруженном файле не найдено подходящих слов", "error");
                        return;
                    }

                    setDictionary(prev => {
                        const merged = [...new Set([...prev, ...words])].sort((a, b) => a.localeCompare(b, 'ru'));
                        showToast(`Файл успешно прочитан! База обновлена: ${merged.length} слов`, "success");
                        triggerAutoCommitIfEnabled(merged);
                        return merged;
                    });
                    event.target.value = null;
                };
                reader.readAsText(file, 'UTF-8');
            };

            // Скачивание файла на устройство
            const handleDownloadDictionary = () => {
                if (dictionary.length === 0) {
                    showToast("Словарь пуст, скачивать нечего", "error");
                    return;
                }

                const sortedDict = [...dictionary].sort((a, b) => a.localeCompare(b, 'ru'));
                const fileContent = sortedDict.join('\r\n');
                
                const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'russian_words_nouns.txt';
                
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                showToast("Словарь сохранен как russian_words_nouns.txt!", "success");
            };

            // Добавление выбранных кандидатов
            const handleImportSelected = () => {
                const selectedWords = candidates
                    .filter(c => c.selected && c.word.trim())
                    .map(c => c.word.trim().toLowerCase());

                if (selectedWords.length === 0) {
                    showToast("Не выбрано ни одного слова для импорта", "warning");
                    return;
                }

                setDictionary(prev => {
                    const updated = [...new Set([...prev, ...selectedWords])].sort((a, b) => a.localeCompare(b, 'ru'));
                    showToast(`Импортировано слов в базу: ${selectedWords.length}`, "success");
                    triggerAutoCommitIfEnabled(updated);
                    return updated;
                });

                setCandidates([]);
                setInputText('');
            };

            const handlePasteFromClipboard = async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) {
                        setInputText(prev => prev ? prev + '\n' + text : text);
                        showToast("Текст успешно вставлен из буфера обмена!", "success");
                    } else {
                        showToast("Буфер обмена пуст", "warning");
                    }
                } catch (err) {
                    showToast("Вставьте текст вручную с помощью Ctrl+V", "info");
                }
            };

            const handleAddManualWord = () => {
                const word = manualWord.trim().toLowerCase();
                if (!word) return;

                if (!/^[а-яё\-]+$/.test(word)) {
                    showToast("Слово должно состоять только из русских букв", "error");
                    return;
                }

                if (dictionary.includes(word)) {
                    showToast("Это слово уже есть в словаре!", "warning");
                    return;
                }

                setDictionary(prev => {
                    const updated = [...prev, word].sort((a, b) => a.localeCompare(b, 'ru'));
                    showToast(`Слово "${word}" успешно добавлено!`, "success");
                    triggerAutoCommitIfEnabled(updated);
                    return updated;
                });
                setManualWord('');
            };

            const handleDeleteWord = (wordToDelete) => {
                setDictionary(prev => {
                    const updated = prev.filter(w => w !== wordToDelete);
                    showToast(`Слово "${wordToDelete}" удалено`, "info");
                    triggerAutoCommitIfEnabled(updated);
                    return updated;
                });
            };

            const startEditing = (word, index) => {
                setEditingIndex(index);
                setEditingValue(word);
            };

            const saveEditing = (originalWord) => {
                const cleanValue = editingValue.trim().toLowerCase();
                if (!cleanValue) return;

                if (!/^[а-яё\-]+$/.test(cleanValue)) {
                    showToast("Недопустимые символы", "error");
                    return;
                }

                setDictionary(prev => {
                    const filtered = prev.filter(w => w !== originalWord);
                    if (filtered.includes(cleanValue)) {
                        showToast("Такое слово уже существует!", "warning");
                        return prev;
                    }
                    const updated = [...filtered, cleanValue].sort((a, b) => a.localeCompare(b, 'ru'));
                    showToast(`Слово изменено на "${cleanValue}"`, "success");
                    triggerAutoCommitIfEnabled(updated);
                    return updated;
                });

                setEditingIndex(null);
            };

            const toggleCandidateSelect = (id) => {
                setCandidates(prev => prev.map(c => c.id === id ? { ...c, selected: !c.selected } : c));
            };

            const handleEditCandidateWord = (id, newWord) => {
                setCandidates(prev => prev.map(c => {
                    if (c.id === id) {
                        const alreadyExists = dictionary.includes(newWord.trim().toLowerCase());
                        return { 
                            ...c, 
                            word: newWord, 
                            status: alreadyExists ? 'duplicate' : 'new' 
                        };
                    }
                    return c;
                }));
            };

            const handleSelectAllCandidates = (select) => {
                setCandidates(prev => prev.map(c => ({ ...c, selected: select && c.status !== 'invalid' })));
            };

            const clearCandidates = () => {
                setCandidates([]);
            };

            const handleClearDictionary = () => {
                if (window.confirm("Вы уверены, что хотите полностью стереть текущий словарь?")) {
                    setDictionary([]);
                    showToast("Словарь полностью очищен", "info");
                    triggerAutoCommitIfEnabled([]);
                }
            };

            // --- Фильтры и статистика ---
            const filteredDictionary = useMemo(() => {
                const query = searchQuery.trim().toLowerCase();
                if (!query) return dictionary;
                return dictionary.filter(w => w.includes(query));
            }, [dictionary, searchQuery]);

            const filteredCandidates = useMemo(() => {
                const query = candidateSearchQuery.trim().toLowerCase();
                if (!query) return candidates;
                return candidates.filter(c => c.word.includes(query));
            }, [candidates, candidateSearchQuery]);

            const totalPages = Math.ceil(filteredDictionary.length / itemsPerPage) || 1;
            const paginatedDictionary = useMemo(() => {
                const startIndex = (currentPage - 1) * itemsPerPage;
                return filteredDictionary.slice(startIndex, startIndex + itemsPerPage);
            }, [filteredDictionary, currentPage]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchQuery]);

            const stats = useMemo(() => {
                const total = dictionary.length;
                const candidatesCount = candidates.length;
                const selectedCount = candidates.filter(c => c.selected).length;
                const duplicateCount = candidates.filter(c => c.status === 'duplicate').length;
                
                const uniqueCount = candidates.filter(c => c.status === 'new').length;
                const uniqueRatio = candidatesCount > 0 ? ((uniqueCount / candidatesCount) * 100).toFixed(1) : 0;

                return { total, candidatesCount, selectedCount, duplicateCount, uniqueRatio, uniqueCount };
            }, [dictionary, candidates]);

            const isGhConfigured = ghToken.trim() && ghOwner.trim() && ghRepo.trim();

            return (
                <div className="min-h-screen bg-zinc-950 text-zinc-100 flex flex-col font-sans selection:bg-indigo-500/30 selection:text-indigo-200">
                    
                    {/* --- Навигационный заголовок --- */}
                    <header className="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md sticky top-0 z-50 transition-all">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="p-2.5 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl shadow-lg shadow-indigo-500/20">
                                    <BookOpen className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight bg-gradient-to-r from-zinc-50 via-zinc-200 to-zinc-400 bg-clip-text text-transparent">
                                        NounForge RU
                                    </h1>
                                    <p className="text-xs text-zinc-400">Словарный процессор существительных</p>
                                </div>
                            </div>

                            <div className="flex items-center space-x-2">
                                {/* Кнопка настроек GitHub */}
                                <button
                                    onClick={() => setShowGhConfig(!showGhConfig)}
                                    className={`flex items-center space-x-2 px-3 py-2 rounded-xl text-xs font-semibold border transition-all ${
                                        isGhConfigured 
                                            ? 'bg-indigo-950/40 border-indigo-900/50 text-indigo-300 hover:bg-indigo-900/30' 
                                            : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:text-zinc-200 hover:border-zinc-700'
                                    }`}
                                >
                                    <Github className="w-4 h-4" />
                                    <span className="hidden sm:inline">Связь с GitHub</span>
                                    <Settings className="w-3.5 h-3.5 opacity-60 ml-1.5" />
                                </button>

                                {/* Статус GitHub */}
                                {isGhConfigured && (
                                    <div className="hidden md:flex items-center space-x-1.5 px-2.5 py-2 bg-zinc-900 border border-zinc-800 rounded-xl text-xs">
                                        <span className={`w-2.5 h-2.5 rounded-full ${
                                            ghStatus === 'connected' && isSyncedWithGitHub ? 'bg-emerald-500' :
                                            ghStatus === 'connected' && !isSyncedWithGitHub ? 'bg-yellow-500 animate-pulse' :
                                            ghStatus === 'loading' || ghStatus === 'syncing' ? 'bg-amber-500 animate-pulse' :
                                            ghStatus === 'error' ? 'bg-red-500' : 'bg-zinc-600'
                                        }`} />
                                        <span className="text-zinc-400">
                                            {ghStatus === 'connected' && isSyncedWithGitHub ? `Синхронизирован (${githubWordsCount || 0} слов)` :
                                             ghStatus === 'connected' && !isSyncedWithGitHub ? 'Требуется Pull!' :
                                             ghStatus === 'loading' ? 'Скачивание...' :
                                             ghStatus === 'syncing' ? 'Коммит...' :
                                             ghStatus === 'error' ? 'Ошибка связи' : 'Не подключен'}
                                        </span>
                                    </div>
                                )}

                                <button 
                                    onClick={handleDownloadDictionary}
                                    className="flex items-center space-x-1.5 bg-zinc-900 hover:bg-zinc-800 active:scale-98 border border-zinc-800 transition-all px-3 py-2 rounded-xl text-xs font-semibold text-zinc-300"
                                    title="Скачать файл локально"
                                >
                                    <Download className="w-3.5 h-3.5" />
                                    <span className="hidden sm:inline">Скачать ({stats.total})</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* --- Настройки GitHub --- */}
                    {showGhConfig && (
                        <div className="bg-zinc-900 border-b border-zinc-800 p-6">
                            <div className="max-w-4xl mx-auto space-y-6">
                                
                                {/* ПРЕДУПРЕЖДЕНИЕ О ФАЙЛОВОМ ПРОТОКОЛЕ (CORS WARNING) */}
                                {isLocalFile && (
                                    <div className="p-4 bg-red-950/40 border border-red-900/50 rounded-2xl flex items-start space-x-3">
                                        <AlertCircle className="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" />
                                        <div className="text-xs text-red-200 leading-relaxed">
                                            <strong className="block font-semibold text-red-300 mb-0.5">⚠️ Внимание! Вы запустили файл локально (file://)</strong>
                                            Браузеры блокируют любые защищенные исходящие API-запросы к GitHub с локально открытых файлов из-за CORS ограничений. 
                                            Для полноценной работы синхронизации, пожалуйста, опубликуйте этот репозиторий на <strong>GitHub Pages</strong> или запустите проект через локальный веб-сервер (например, плагин <code className="bg-zinc-950 px-1 py-0.5 rounded text-red-400 font-mono">Live Server</code> в VS Code).
                                        </div>
                                    </div>
                                )}

                                <div className="flex items-center justify-between">
                                    <div className="flex items-center space-x-2">
                                        <Github className="w-5 h-5 text-indigo-400" />
                                        <h3 className="font-semibold text-zinc-100">Прямая интеграция с репозиторием GitHub</h3>
                                    </div>
                                    <button 
                                        onClick={() => setShowGhConfig(false)}
                                        className="text-zinc-500 hover:text-zinc-300 transition-colors"
                                    >
                                        <X className="w-5 h-5" />
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {/* Поля конфигурации */}
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs text-zinc-400 mb-1 font-medium flex items-center space-x-1.5">
                                                <Key className="w-3 h-3 text-indigo-400" />
                                                <span>Personal Access Token (PAT)</span>
                                            </label>
                                            <input
                                                type="password"
                                                placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxx"
                                                value={ghToken}
                                                onChange={(e) => setGhToken(e.target.value)}
                                                className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 font-mono text-indigo-300"
                                            />
                                            <p className="text-[10px] text-zinc-500 mt-1">
                                                Создайте токен GitHub в настройках вашего профиля с правами (scope) <code className="text-zinc-400 font-mono">repo</code>.
                                            </p>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-xs text-zinc-400 mb-1 font-medium">Владелец (Owner)</label>
                                                <input
                                                    type="text"
                                                    placeholder="Имя на GitHub"
                                                    value={ghOwner}
                                                    onChange={(e) => setGhOwner(e.target.value)}
                                                    className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 font-mono"
                                                />

                            <div className="p-6 border-b border-zinc-800 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                                <div>
                                    <h2 className="text-base font-semibold text-zinc-100 flex items-center space-x-2">
                                        <span>Базовый словарь</span>
                                        <span className="ml-2 bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-full text-xs font-mono">
                                            {filteredDictionary.length} {filteredDictionary.length === dictionary.length ? '' : `из ${dictionary.length}`}
                                        </span>
                                    </h2>
                                    <p className="text-xs text-zinc-400 mt-0.5">
                                        Активный набор существительных в алфавитном порядке. Любое слово можно изменить или стереть.
                                    </p>
                                </div>

                                {/* Фильтр поиска и инструменты очистки */}
                                <div className="flex flex-col sm:flex-row items-center gap-2">
                                    <div className="relative w-full sm:w-64">
                                        <Search className="w-4 h-4 text-zinc-500 absolute left-3 top-1/2 -translate-y-1/2" />
                                        <input
                                            type="text"
                                            placeholder="Найти слово в базе..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-9 pr-4 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500 placeholder-zinc-600 font-sans"
                                        />
                                        {searchQuery && (
                                            <button 
                                                onClick={() => setSearchQuery('')}
                                                className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 text-xs font-semibold"
                                            >
                                                Сбросить
                                            </button>
                                        )}
                                    </div>

                                    {dictionary.length > 0 && (
                                        <button
                                            onClick={handleClearDictionary}
                                            className="w-full sm:w-auto text-xs text-red-400 hover:text-red-300 bg-red-950/20 hover:bg-red-950/40 px-3 py-2 rounded-xl border border-red-900/30 transition-all flex items-center justify-center space-x-1.5"
                                        >
                                            <Trash2 className="w-3.5 h-3.5" />
                                            <span>Сбросить словарь</span>
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* Отображение списка слов */}
                            {filteredDictionary.length === 0 ? (
                                <div className="py-16 text-center text-zinc-500 space-y-2">
                                    <AlertCircle className="w-8 h-8 text-zinc-600 mx-auto" />
                                    <p className="text-sm font-semibold text-zinc-400">Слова не найдены</p>
                                    <p className="text-xs text-zinc-500">Смените параметры поиска или добавьте новые слова.</p>
                                </div>
                            ) : (
                                <div className="p-6">
                                    
                                    {/* Сетка слов */}
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                        {paginatedDictionary.map((word, index) => {
                                            const globalIndex = (currentPage - 1) * itemsPerPage + index;
                                            const isEditing = editingIndex === globalIndex;

                                            return (
                                                <div 
                                                    key={`${word}-${globalIndex}`}
                                                    className="group bg-zinc-950 border border-zinc-800/80 hover:border-zinc-700 p-2.5 rounded-xl flex items-center justify-between transition-all"
                                                >
                                                    {isEditing ? (
                                                        <input
                                                            type="text"
                                                            value={editingValue}
                                                            onChange={(e) => setEditingValue(e.target.value)}
                                                            onKeyDown={(e) => e.key === 'Enter' && saveEditing(word)}
                                                            onBlur={() => saveEditing(word)}
                                                            className="bg-zinc-900 border border-indigo-500 rounded px-1.5 py-0.5 text-xs text-zinc-200 font-medium w-full focus:outline-none"
                                                            autoFocus
                                                        />
                                                    ) : (
                                                        <span className="text-xs text-zinc-300 font-medium font-mono truncate mr-2">
                                                            {word}
                                                        </span>
                                                    )}

                                                    {!isEditing && (
                                                        <div className="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button
                                                                onClick={() => startEditing(word, globalIndex)}
                                                                className="p-1 hover:bg-zinc-800 hover:text-indigo-400 rounded transition-all"
                                                                title="Изменить слово"
                                                            >
                                                                <Edit2 className="w-3 h-3" />
                                                            </button>
                                                            <button
                                                                onClick={() => handleDeleteWord(word)}
                                                                className="p-1 hover:bg-zinc-800 hover:text-red-400 rounded transition-all"
                                                                title="Удалить слово"
                                                            >
                                                                <X className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Пагинация */}
                                    {totalPages > 1 && (
                                        <div className="mt-8 pt-6 border-t border-zinc-800/50 flex flex-col sm:flex-row items-center justify-between gap-4">
                                            <div className="text-xs text-zinc-500">
                                                Показано {(currentPage - 1) * itemsPerPage + 1}–{Math.min(currentPage * itemsPerPage, filteredDictionary.length)} из {filteredDictionary.length} слов
                                            </div>

                                            <div className="flex items-center space-x-1">
                                                <button
                                                    onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                                                    disabled={currentPage === 1}
                                                    className="p-2 rounded-xl bg-zinc-950 border border-zinc-850 hover:bg-zinc-800 disabled:opacity-40 disabled:hover:bg-transparent text-zinc-400 transition-all"
                                                >
                                                    <ChevronLeft className="w-4 h-4" />
                                                </button>
                                                
                                                {Array.from({ length: Math.min(5, totalPages) }, (_, i) => {
                                                    let pageNumber = i + 1;
                                                    if (currentPage > 3 && totalPages > 5) {
                                                        pageNumber = currentPage - 3 + i;
                                                        if (pageNumber + (4 - i) > totalPages) {
                                                            pageNumber = totalPages - 4 + i;
                                                        }
                                                    }
                                                    
                                                    return (
                                                        <button
                                                            key={pageNumber}
                                                            onClick={() => setCurrentPage(pageNumber)}
                                                            className={`w-9 h-9 text-xs font-semibold rounded-xl border transition-all ${
                                                                currentPage === pageNumber
                                                                    ? 'bg-indigo-600 border-indigo-500 text-white shadow'
                                                                    : 'bg-zinc-950 border-zinc-800 text-zinc-400 hover:bg-zinc-850 hover:text-zinc-200'
                                                            }`}
                                                        >
                                                            {pageNumber}
                                                        </button>
                                                    );
                                                })}

                                                <button
                                                    onClick={() => setCurrentPage(prev => Math.min(totalPages, prev + 1))}
                                                    disabled={currentPage === totalPages}
                                                    className="p-2 rounded-xl bg-zinc-950 border border-zinc-800 hover:bg-zinc-800 disabled:opacity-40 disabled:hover:bg-transparent text-zinc-400 transition-all"
                                                >
                                                    <ChevronRight className="w-4 h-4" />
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}

                        </section>

                        {/* --- Интерактивное руководство пользователя --- */}
                        <footer className="bg-zinc-900/30 border border-zinc-800/80 p-6 rounded-2xl">
                            <h3 className="text-sm font-semibold text-zinc-200 flex items-center space-x-2 mb-3">
                                <Info className="w-4 h-4 text-indigo-400" />
                                <span>Интеграция с репозиторием GitHub</span>
                            </h3>
                            <p className="text-xs text-zinc-400 leading-relaxed mb-3">
                                Данное приложение может полноценно синхронизироваться с GitHub напрямую через ваш браузер:
                            </p>
                            <ul className="text-xs text-zinc-400 space-y-2 list-disc list-inside leading-relaxed">
                                <li>Нажмите <strong className="text-indigo-300">«Связь с GitHub»</strong> в верхнем меню.</li>
                                <li>Укажите ваши учетные данные репозитория. Сгенерируйте токен в меню GitHub: <span className="font-mono text-zinc-300 text-[11px] bg-zinc-950 px-1 py-0.5 rounded border border-zinc-800">Developer Settings &gt; Personal Access Tokens &gt; Tokens (classic)</span>. Дайте ему права <code className="text-indigo-400">repo</code>.</li>
                                <li>Включите тумблер <strong className="text-indigo-300">«Авто-коммит изменений»</strong> — и при добавлении, модерации, удалении или изменении любого слова приложение само моментально обновит ваш репозиторий.</li>
                            </ul>
                        </footer>

                    </main>

                    {/* --- ПРЕДОХРАНИТЕЛЬНЫЙ МОДАЛЬНЫЙ ДИАЛОГ (ЗАЩИТА ОТ ЗАТИРАНИЯ ФАЙЛОВ) --- */}
                    {showOverWriteModal && (
                        <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-zinc-900 border border-zinc-800 max-w-md w-full rounded-2xl p-6 shadow-2xl space-y-4">
                                <div className="flex items-center space-x-3 text-amber-500">
                                    <AlertCircle className="w-8 h-8 flex-shrink-0 animate-bounce-short" />
                                    <h3 className="text-lg font-bold text-zinc-100">Внимание: Опасность перезаписи!</h3>
                                </div>
                                
                                <p className="text-xs text-zinc-400 leading-relaxed">
                                    Вы собираетесь закоммитить на GitHub локальную базу, содержащую <strong className="text-zinc-200">{dictionary.length}</strong> слов. 
                                    При этом на сервере GitHub сейчас находится файл, содержащий примерно <strong className="text-amber-400">{githubWordsCount || '101k+'}</strong> слов.
                                </p>
                                
                                <p className="text-xs text-red-400 leading-relaxed bg-red-950/20 p-3 border border-red-900/30 rounded-xl">
                                    <strong>Внимание!</strong> Принудительная отправка полностью удалит все 101k+ слов на сервере и заменит их вашими локальными данными. Вы потеряете историю!
                                </p>

                                <div className="space-y-2 pt-2">
                                    <button
                                        onClick={async () => {
                                            setShowOverOverWriteModal(false);
                                            await handlePullFromGitHub(false);
                                        }}
                                        className="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-semibold transition-all shadow"
                                    >
                                        Сначала выполнить Pull (Рекомендуется)
                                    </button>
                                    
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => {
                                                setShowOverOverWriteModal(false);
                                            }}
                                            className="flex-1 py-2 px-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-xl text-xs font-semibold transition-all"
                                        >
                                            Отмена
                                        </button>
                                        <button
                                            onClick={async () => {
                                                setShowOverOverWriteModal(false);
                                                await handlePushToGitHub(null, true); // Игнорируем предохранитель
                                            }}
                                            className="flex-1 py-2 px-3 bg-red-950/40 hover:bg-red-900/50 text-red-200 border border-red-900/40 rounded-xl text-xs font-semibold transition-all"
                                        >
                                            Все равно записать (Force Push)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- Глобальное всплывающее уведомление (Toast) --- */}
                    {toast && (
                        <div className="fixed bottom-6 right-6 z-50 animate-bounce-short">
                            <div className={`flex items-center space-x-3 px-4 py-3 rounded-2xl border shadow-2xl backdrop-blur-md ${
                                toast.type === 'success' 
                                    ? 'bg-emerald-950/90 border-emerald-800 text-emerald-200' 
                                    : toast.type === 'error' 
                                    ? 'bg-red-950/90 border-red-900 text-red-200' 
                                    : toast.type === 'warning' 
                                    ? 'bg-amber-950/90 border-amber-900 text-amber-200' 
                                    : 'bg-zinc-900/90 border-zinc-800 text-zinc-200'
                            }`}>
                                {toast.type === 'success' && <CheckCircle2 className="w-5 h-5 text-emerald-400 flex-shrink-0" />}
                                {toast.type === 'error' && <AlertCircle className="w-5 h-5 text-red-400 flex-shrink-0" />}
                                {toast.type === 'warning' && <AlertCircle className="w-5 h-5 text-amber-400 flex-shrink-0" />}
                                {toast.type === 'info' && <Info className="w-5 h-5 text-indigo-400 flex-shrink-0" />}
                                
                                <span className="text-xs font-semibold tracking-tight">{toast.message}</span>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // --- Монтирование приложения React 18 в браузере ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
